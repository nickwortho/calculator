<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto" rel="stylesheet">
</head>

<body>
    <div id="calculator">
        <div id="display"></div>
        <div id="inputBtns">
            <div class="row">
                <button data-value="CLR">CL</button>
                <button class="nul" data-value="NUL"></button>
                <button class="nul" data-value="NUL"></button>
                <button data-value="DIV">&divide;</button>
            </div>
            <div class="row">
                <button data-value="7">7</button>
                <button data-value="8">8</button>
                <button data-value="9">9</button>
                <button data-value="MUL">&times;</button>
            </div>
            <div class="row">
                <button data-value="4">4</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>
                <button data-value="SUB">&minus;</button>
            </div>
            <div class="row">
                <button data-value="1">1</button>
                <button data-value="2">2</button>
                <button data-value="3">3</button>
                <button data-value="ADD">&plus;</button>
            </div>
            <div class="row">
                <button class="nul" data-value="NUL"></button>
                <button data-value="0">0</button>
                <button class="nul" data-value="NUL"></button>
                <button data-value="EQL">&equals;</button>
            </div>
        </div>
    </div>
</body>

</html>
